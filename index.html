<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARDEO - Descubre Nuevas Formas de Disfrutar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
    <link rel="stylesheet" href="./css/output.css">
    <style>
        /* Estilos personalizados */
        .gradient-text {
            background: linear-gradient(135deg, #07000e, #1c61d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .sidebar {
            transition: all 0.3s ease;
        }
        
        .overlay {
            transition: all 0.3s ease;
        }
        
        /* Estilo para el overlay del sidebar */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 40;
            opacity: 0;
            visibility: hidden;
        }
        
        #overlay.visible {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <!-- Overlay para el sidebar -->
    <div id="overlay" class="overlay opacity-0 invisible"></div>

    <!-- Barra superior -->
    <nav class="bg-gradient-to-r from-black to-blue-500 text-white p-4 md:p-6 shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center">
            <div class="text-2xl md:text-3xl font-bold tracking-wide text-center flex-1">
                <a href="./index.html">TARDEO</a>
            </div>
            <button class="menu-toggle p-2 rounded hover:bg-white/10 transition-colors" id="menuToggle">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </div>
    </nav>

    <!-- Menú lateral desplegable -->
    <div class="sidebar fixed top-0 -right-80 w-72 h-screen bg-white shadow-xl z-50 p-6 overflow-y-auto" id="sidebar">
        <div class="flex justify-between items-center mb-8 pb-4 border-b">
            <h2 class="text-xl font-semibold text-blue-600">Mi Cuenta</h2>
            <button class="close-btn text-gray-600 hover:text-gray-800 text-xl" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <ul class="space-y-2">
            <li>
                <a href="#" class="flex items-center p-3 rounded-lg hover:bg-gray-100 hover:text-blue-600 transition-colors">
                    <i class="fas fa-user mr-4 text-lg w-5 text-center"></i> Perfil
                </a>
            </li>
            <li>
                <a href="#" class="flex items-center p-3 rounded-lg hover:bg-gray-100 hover:text-blue-600 transition-colors">
                    <i class="fas fa-cog mr-4 text-lg w-5 text-center"></i> Configuración
                </a>
            </li>
            <li>
                <a href="./html/infoCreador.html" class="flex items-center p-3 rounded-lg hover:bg-gray-100 hover:text-blue-600 transition-colors">
                    <i class="fa-solid fa-code mr-4 text-lg w-5 text-center"></i> Información Creador
                </a>
            </li>
            <li>
                <a href="#" class="flex items-center p-3 rounded-lg hover:bg-gray-100 hover:text-blue-600 transition-colors">
                    <i class="fas fa-question-circle mr-4 text-lg w-5 text-center"></i> Ayuda
                </a>
            </li>
            <li>
                <a href="./login.html" class="flex items-center p-3 rounded-lg hover:bg-gray-100 hover:text-blue-600 transition-colors">
                    <i class="fas fa-sign-in-alt mr-4 text-lg w-5 text-center"></i> Iniciar Sesión
                </a>
            </li>
            <li>
                <a href="#" class="flex items-center p-3 rounded-lg hover:bg-gray-100 hover:text-blue-600 transition-colors">
                    <i class="fas fa-sign-out-alt mr-4 text-lg w-5 text-center"></i> Cerrar Sesión
                </a>
            </li>
        </ul>
    </div>

    <!-- Contenido principal -->
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <section class="text-center mb-12">
            <h1 class="text-3xl md:text-4xl font-bold mb-4 gradient-text">
                Descubre nuevas formas de disfrutar tu tiempo libre
            </h1>
            <p class="text-gray-600 text-lg max-w-2xl mx-auto">
                Encuentra los mejores eventos y actividades cerca de ti
            </p>
        </section>

        <!-- Botones de categorías -->
        <div class="flex flex-wrap justify-center gap-4 mb-12">
            
            <a href="./html/filtros.html">
                <button class="category-btn px-5 py-3 bg-white border-2 border-gray-200 rounded-full font-semibold 
                                flex items-center gap-2 hover:border-blue-500 hover:text-blue-600 transition-colors">
                    <i class="fas fa-search"></i> Filtros
                </button>
            </a>
        </div>


        <!-- <div class="flex flex-wrap justify-center gap-4 mb-12">
            <a href="./html/ciudades.html">
                <button class="category-btn px-6 py-3 bg-white border-2 border-gray-200 rounded-full font-semibold 
                                flex items-center gap-2 hover:border-black hover:text-black transition-colors">
                    <i class="fas fa-city"></i> Ciudades
                </button>
            </a>

        </div> -->

        <h2 class="text-3xl font-bold text-center mb-8 gradient-text">Destacados</h2>
        
        <div class="container mx-auto">
            
            <p class="text-center text-gray-600 mb-10">Descubre experiencias únicas en tu ciudad</p>
        
            <!-- Contenedor donde se insertarán las cartas dinámicamente -->
            <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Las cartas se generarán aquí automáticamente -->
            </div>
        </div>

        <template id="card-template">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:-translate-y-2 transition-transform duration-300 hover:shadow-xl">
                <img src="" 
                    alt="Imagen del evento" 
                    class="w-full h-48 object-cover"
                    onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold event-title"></h3>
                        <span class="event-categoria bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded"></span>
                    </div>
                    <p class="event-descripcion text-gray-600 mb-4"></p>
                
                    <div class="space-y-3 mb-4">
                        <div class="flex items-center text-gray-500 text-sm">
                            <i class="fas fa-map-marker-alt mr-2"></i>
                            <span class="event-lugar"></span>
                        </div>
                        <div class="flex items-center text-gray-500 text-sm">
                            <i class="far fa-calendar mr-2"></i>
                            <span class="event-fecha"></span>
                        </div>
                    </div>
                
                    <div class="flex justify-between items-center pt-4 border-t border-gray-100">
                        <div class="flex items-center text-blue-600 font-semibold">
                            <i class="far fa-clock mr-2"></i>
                            <span class="event-hora"></span>
                        </div>
                        <div class="text-right">
                            <div class="event-precio text-lg font-bold text-gray-800"></div>
                            <div class="event-disponibilidad text-xs text-gray-500"></div>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Scripts -->
    <script src="./js/menu.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
